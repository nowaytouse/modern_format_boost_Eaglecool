<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Modern Format Boost</title>
<style>
:root {
  --bg:#191919; --bg2:#232323; --bg3:#2d2d2d; --bg4:#363636;
  --border:#3a3a3a; --text:#e8e8e8; --dim:#888; --dim2:#555;
  --accent:#5b9cf6; --accent2:#4a88e0;
  --green:#5ec269; --red:#e85d5d; --yellow:#e8b84d; --purple:#b07ee8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Titlebar - Windows layout */
.titlebar{height:36px;background:#161616;border-bottom:1px solid var(--border);display:flex;align-items:center;-webkit-app-region:drag;user-select:none;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:8px;padding-left:12px;flex:1;-webkit-app-region:drag}
.tb-logo{font-size:14px}
.tb-title{font-size:12px;color:var(--dim);font-weight:500}
.tb-center{display:flex;gap:6px;-webkit-app-region:no-drag}
.tb-act{background:var(--bg3);border:1px solid var(--border);color:var(--dim);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:500}
.tb-act:hover{color:var(--text);background:var(--bg4)}
.tb-win-btns{display:flex;-webkit-app-region:no-drag}
.tb-win-btn{width:46px;height:36px;border:none;background:transparent;color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb-win-btn:hover{background:var(--bg4);color:var(--text)}
.tb-win-btn.close:hover{background:var(--red);color:#fff}

/* Body */
.body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.card-title{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}

/* Selection */
.sel-box{background:var(--bg3);border-radius:6px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.sel-box .count{color:var(--accent);font-weight:700;font-size:22px;margin-right:6px}
.sel-box .label{color:var(--dim);font-size:13px}

/* Flags */
.flags{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.flag{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:6px;padding:10px 12px;cursor:pointer;transition:background .15s}
.flag:hover{background:var(--bg4)}
.flag-label{font-size:13px;font-weight:600;color:var(--text)}
.flag-desc{font-size:10px;color:var(--dim);margin-top:2px}
.switch{position:relative;width:34px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--dim2);border-radius:10px;transition:.2s;cursor:pointer}
.switch .sl::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.sl{background:var(--accent)}
.switch input:checked+.sl::before{transform:translateX(14px)}

/* Log */
#log{flex:1;background:#111;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:11px;color:#aaa;resize:none;min-height:80px;line-height:1.6}
#log::-webkit-scrollbar{width:5px}
#log::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* Status summary */
#status-summary{background:var(--bg3);border-radius:6px;padding:10px 12px;font-size:12px;line-height:1.7;color:var(--dim);max-height:90px;overflow-y:auto;display:none;font-family:'SF Mono','Menlo','Consolas',monospace}
#status-summary .s-ok{color:var(--green);font-weight:600}
#status-summary .s-skip{color:var(--yellow)}
#status-summary .s-fail{color:var(--red);font-weight:600}

/* Help panel */
#help-panel{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;color:var(--dim)}
#help-panel h3{color:var(--text);font-size:14px;font-weight:700;margin-bottom:8px}
#help-panel ul{padding-left:18px;margin:4px 0 8px}
#help-panel li{margin-bottom:2px}

/* Buttons */
.btn{-webkit-app-region:no-drag;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--bg4);border-color:#4a4a4a}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:var(--accent);border-color:var(--accent2);color:#fff;font-weight:700;font-size:14px;padding:8px 20px}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}

/* Footer */
.footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg2);flex-shrink:0}
#stats{flex:1;font-size:13px;color:var(--dim);font-weight:500}
.hidden{display:none}
</style>
</head>
<body>

<div class="titlebar">
  <div class="tb-left">
    <span class="tb-logo">⚡</span>
    <span class="tb-title">Modern Format Boost</span>
  </div>
  <div class="tb-center">
    <button class="tb-act" id="btn-help" data-i18n="help">帮助</button>
    <button class="tb-act" id="btn-lang">EN</button>
  </div>
  <div class="tb-win-btns">
    <button class="tb-win-btn" id="btn-min" title="Minimize">─</button>
    <button class="tb-win-btn close" id="btn-close" title="Close">✕</button>
  </div>
</div>

<div class="body">
  <div id="help-panel"></div>

  <div class="card">
    <div class="card-title" data-i18n="selectedItems">选中素材</div>
    <div class="sel-box">
      <div id="sel-info"><span class="label" data-i18n="noSelection">未选中任何素材</span></div>
      <button class="btn btn-sm" id="btn-refresh" data-i18n="refresh">刷新</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="params">处理参数</div>
    <div class="flags">
      <label class="flag">
        <div><div class="flag-label" data-i18n="appleCompat">Apple 兼容</div><div class="flag-desc" data-i18n="appleDesc">HEIC 跳过, WebP→HEVC</div></div>
        <div class="switch"><input type="checkbox" id="f-apple" checked><span class="sl"></span></div>
      </label>
      <label class="flag">
        <div><div class="flag-label" data-i18n="ultimate">极限模式</div><div class="flag-desc" data-i18n="ultimateDesc">SSIM 饱和搜索</div></div>
        <div class="switch"><input type="checkbox" id="f-ultimate" checked><span class="sl"></span></div>
      </label>
      <label class="flag">
        <div><div class="flag-label" data-i18n="force">强制重转</div><div class="flag-desc" data-i18n="forceDesc">忽略已处理标记</div></div>
        <div class="switch"><input type="checkbox" id="f-force"><span class="sl"></span></div>
      </label>
    </div>
  </div>

  <div class="card" style="flex:1;display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="card-title" style="margin:0" data-i18n="log">运行日志</span>
      <button class="btn btn-sm" id="btn-clear" data-i18n="clear">清空</button>
    </div>
    <textarea id="log" readonly></textarea>
    <div id="status-summary"></div>
  </div>
</div>

<div class="footer">
  <div id="stats"></div>
  <button class="btn btn-primary" id="btn-run" data-i18n="start">开始处理</button>
</div>

<script src="js/plugin.js"></script>
</body>
</html>
